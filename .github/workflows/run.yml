name: Run pipeline

on:
  schedule:
    # 06:00 en 18:00 UTC = 07:00/19:00 NL-tijd in winter, 08:00/20:00 in zomer (DST)
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # nodig om de pages-workflow te dispatchen na een commit

concurrency:
  group: run-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python run.py

      - name: Commit & push results
        # Ook bij gedeeltelijke fout: bewaar wat er wél lukte (nieuwe ingest,
        # filter-state, partial scoring). Volgende run pakt de rest op.
        if: success() || failure()
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.db site/index.html
          if git diff --staged --quiet; then
            echo "Geen wijzigingen om te committen."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Automatische run: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        # Push-events vanuit GITHUB_TOKEN triggeren geen workflows — dispatch handmatig.
        if: (success() || failure()) && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main

      - name: Fail job if pipeline failed
        # Maak de workflow zichtbaar rood als de pipeline een stap miste, maar
        # pas NA commit+push zodat we niets verliezen.
        if: steps.pipeline.outcome == 'failure'
        run: |
          echo "Pipeline rapporteerde failures — zie 'Run pipeline'-step hierboven."
          exit 1
